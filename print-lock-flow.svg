<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1400" font-family="Segoe UI, Arial, sans-serif">
  <!-- Background -->
  <rect width="900" height="1400" fill="#f8f9fa"/>

  <!-- Title -->
  <rect x="50" y="20" width="800" height="50" rx="10" fill="#1a1a2e"/>
  <text x="450" y="52" text-anchor="middle" font-size="20" font-weight="bold" fill="white">Print Lock System — Alur Backend</text>

  <!-- ===== STEP 1: USER TAP PRINT ===== -->
  <rect x="300" y="95" width="300" height="50" rx="25" fill="#4CAF50"/>
  <text x="450" y="126" text-anchor="middle" font-size="15" font-weight="bold" fill="white">User Tap Print</text>

  <!-- Arrow down -->
  <line x1="450" y1="145" x2="450" y2="175" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== STEP 2: POST print-lock ===== -->
  <rect x="225" y="175" width="450" height="55" rx="8" fill="#1565C0"/>
  <text x="450" y="197" text-anchor="middle" font-size="13" font-weight="bold" fill="white">POST /api/labels/:noLabel/print-lock</text>
  <text x="450" y="217" text-anchor="middle" font-size="11" fill="#bbdefb">Acquire Lock</text>

  <!-- Arrow down -->
  <line x1="450" y1="230" x2="450" y2="260" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== DECISION: Lock aktif? ===== -->
  <polygon points="450,260 600,310 450,360 300,310" fill="#F57C00"/>
  <text x="450" y="305" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Lock sudah</text>
  <text x="450" y="323" text-anchor="middle" font-size="13" font-weight="bold" fill="white">aktif?</text>

  <!-- YES branch (left) -->
  <line x1="300" y1="310" x2="160" y2="310" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="230" y="300" text-anchor="middle" font-size="12" fill="#c62828" font-weight="bold">YA</text>

  <!-- NO branch (down) -->
  <line x1="450" y1="360" x2="450" y2="390" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="465" y="380" font-size="12" fill="#2e7d32" font-weight="bold">TIDAK</text>

  <!-- ===== YES path: DECISION pemilik sama? ===== -->
  <polygon points="110,310 210,345 110,380 10,345" fill="#F57C00"/>
  <text x="110" y="340" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Pemilik</text>
  <text x="110" y="357" text-anchor="middle" font-size="11" font-weight="bold" fill="white">sama?</text>

  <!-- YA → perpanjang -->
  <line x1="110" y1="380" x2="110" y2="420" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="125" y="407" font-size="11" fill="#2e7d32" font-weight="bold">YA</text>
  <rect x="40" y="420" width="140" height="50" rx="8" fill="#388E3C"/>
  <text x="110" y="441" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Perpanjang</text>
  <text x="110" y="458" text-anchor="middle" font-size="11" fill="#c8e6c9">TTL, return 200</text>

  <!-- TIDAK → 409 -->
  <line x1="10" y1="345" x2="10" y2="520" stroke="#555" stroke-width="2"/>
  <line x1="10" y1="520" x2="40" y2="520" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="18" y="338" font-size="11" fill="#c62828" font-weight="bold">TIDAK</text>
  <rect x="40" y="495" width="140" height="55" rx="8" fill="#c62828"/>
  <text x="110" y="516" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Return 409</text>
  <text x="110" y="532" text-anchor="middle" font-size="10" fill="#ffcdd2">{ lockedBy,</text>
  <text x="110" y="546" text-anchor="middle" font-size="10" fill="#ffcdd2">expiresAt }</text>

  <!-- Flutter tampil blocked -->
  <line x1="110" y1="550" x2="110" y2="575" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="40" y="575" width="140" height="50" rx="8" fill="#880E4F"/>
  <text x="110" y="595" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Flutter tampil:</text>
  <text x="110" y="612" text-anchor="middle" font-size="10" fill="#fce4ec">"Sedang dibuka</text>
  <!-- text x="110" y="627" text-anchor="middle" font-size="10" fill="#fce4ec">User A"</text -->

  <!-- ===== NO path: Buat lock baru ===== -->
  <rect x="320" y="390" width="260" height="55" rx="8" fill="#1565C0"/>
  <text x="450" y="412" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Buat lock baru</text>
  <text x="450" y="430" text-anchor="middle" font-size="11" fill="#bbdefb">locks.set(noLabel, { actorId, TTL 3 menit })</text>

  <!-- Arrow down -->
  <line x1="450" y1="445" x2="450" y2="475" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== BROADCAST lock_acquired ===== -->
  <rect x="270" y="475" width="360" height="55" rx="8" fill="#6A1B9A"/>
  <text x="450" y="497" text-anchor="middle" font-size="12" font-weight="bold" fill="white">io.emit('lock_acquired')</text>
  <text x="450" y="515" text-anchor="middle" font-size="11" fill="#e1bee7">{ noLabel, lockedBy, lockedAt, expiresAt }</text>

  <!-- Arrow down -->
  <line x1="450" y1="530" x2="450" y2="560" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== 20 DEVICES ===== -->
  <rect x="270" y="560" width="360" height="45" rx="8" fill="#37474F"/>
  <text x="450" y="579" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Semua 20 device terima</text>
  <text x="450" y="596" text-anchor="middle" font-size="11" fill="#eceff1">→ UI update: label terkunci</text>

  <!-- Arrow down -->
  <line x1="450" y1="605" x2="450" y2="635" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== C# MICROSERVICE ===== -->
  <rect x="270" y="635" width="360" height="55" rx="8" fill="#004D40"/>
  <text x="450" y="657" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Flutter → C# PDF Microservice</text>
  <text x="450" y="675" text-anchor="middle" font-size="11" fill="#b2dfdb">Generate &amp; Print PDF</text>

  <!-- Arrow down -->
  <line x1="450" y1="690" x2="450" y2="720" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== DECISION: Print berhasil? ===== -->
  <polygon points="450,720 620,770 450,820 280,770" fill="#F57C00"/>
  <text x="450" y="765" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Print</text>
  <text x="450" y="783" text-anchor="middle" font-size="13" font-weight="bold" fill="white">berhasil?</text>

  <!-- TIDAK → release -->
  <line x1="280" y1="770" x2="160" y2="770" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="220" y="762" text-anchor="middle" font-size="12" fill="#c62828" font-weight="bold">TIDAK</text>

  <!-- YA → PATCH -->
  <line x1="450" y1="820" x2="450" y2="855" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="465" y="845" font-size="12" fill="#2e7d32" font-weight="bold">YA</text>

  <!-- ===== RELEASE LOCK (left branch) ===== -->
  <rect x="30" y="743" width="130" height="55" rx="8" fill="#c62828"/>
  <text x="95" y="764" text-anchor="middle" font-size="11" font-weight="bold" fill="white">DELETE</text>
  <text x="95" y="780" text-anchor="middle" font-size="10" fill="#ffcdd2">/print-lock</text>
  <text x="95" y="795" text-anchor="middle" font-size="10" fill="#ffcdd2">Release Lock</text>

  <!-- Arrow down from release -->
  <line x1="95" y1="798" x2="95" y2="830" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- broadcast lock_released -->
  <rect x="20" y="830" width="160" height="55" rx="8" fill="#6A1B9A"/>
  <text x="100" y="851" text-anchor="middle" font-size="11" font-weight="bold" fill="white">io.emit(</text>
  <text x="100" y="867" text-anchor="middle" font-size="11" fill="#e1bee7">'lock_released')</text>
  <text x="100" y="882" text-anchor="middle" font-size="10" fill="#e1bee7">{ noLabel }</text>

  <!-- Arrow down from lock_released -->
  <line x1="100" y1="885" x2="100" y2="910" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="20" y="910" width="160" height="45" rx="8" fill="#37474F"/>
  <text x="100" y="930" text-anchor="middle" font-size="11" font-weight="bold" fill="white">20 device terima</text>
  <text x="100" y="947" text-anchor="middle" font-size="10" fill="#eceff1">→ UI: label bebas</text>

  <!-- ===== PATCH hasBeenPrinted ===== -->
  <rect x="240" y="855" width="420" height="55" rx="8" fill="#1565C0"/>
  <text x="450" y="877" text-anchor="middle" font-size="12" font-weight="bold" fill="white">PATCH /api/labels/washing/:noLabel/print</text>
  <text x="450" y="895" text-anchor="middle" font-size="11" fill="#bbdefb">Increment HasBeenPrinted</text>

  <!-- Arrow down -->
  <line x1="450" y1="910" x2="450" y2="940" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== SQL SERVER ===== -->
  <rect x="310" y="940" width="280" height="50" rx="8" fill="#004D40"/>
  <text x="450" y="960" text-anchor="middle" font-size="12" font-weight="bold" fill="white">UPDATE SQL Server</text>
  <text x="450" y="978" text-anchor="middle" font-size="11" fill="#b2dfdb">HasBeenPrinted + 1</text>

  <!-- Arrow down -->
  <line x1="450" y1="990" x2="450" y2="1020" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== BROADCAST print_confirmed ===== -->
  <rect x="270" y="1020" width="360" height="55" rx="8" fill="#6A1B9A"/>
  <text x="450" y="1042" text-anchor="middle" font-size="12" font-weight="bold" fill="white">io.emit('print_confirmed')</text>
  <text x="450" y="1060" text-anchor="middle" font-size="11" fill="#e1bee7">{ noLabel, hasBeenPrinted: &lt;nilai baru&gt; }</text>

  <!-- Arrow down -->
  <line x1="450" y1="1075" x2="450" y2="1105" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== 20 DEVICES FINAL ===== -->
  <rect x="270" y="1105" width="360" height="50" rx="8" fill="#37474F"/>
  <text x="450" y="1125" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Semua 20 device terima</text>
  <text x="450" y="1143" text-anchor="middle" font-size="11" fill="#eceff1">→ UI: counter print update tanpa refresh</text>

  <!-- ===== LEGEND ===== -->
  <rect x="50" y="1185" width="800" height="185" rx="10" fill="#eceff1" stroke="#ccc"/>
  <text x="450" y="1210" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e">Socket.io Events</text>

  <!-- initial_locks -->
  <rect x="70" y="1225" width="20" height="20" fill="#6A1B9A"/>
  <text x="100" y="1240" font-size="12" fill="#1a1a2e" font-weight="bold">initial_locks</text>
  <text x="100" y="1257" font-size="11" fill="#555">Dikirim saat device baru connect → load semua lock aktif</text>

  <!-- lock_acquired -->
  <rect x="70" y="1270" width="20" height="20" fill="#6A1B9A"/>
  <text x="100" y="1285" font-size="12" fill="#1a1a2e" font-weight="bold">lock_acquired</text>
  <text x="100" y="1302" font-size="11" fill="#555">POST print-lock berhasil → semua UI tampil label terkunci</text>

  <!-- lock_released -->
  <rect x="450" y="1225" width="20" height="20" fill="#6A1B9A"/>
  <text x="480" y="1240" font-size="12" fill="#1a1a2e" font-weight="bold">lock_released</text>
  <text x="480" y="1257" font-size="11" fill="#555">DELETE print-lock → semua UI label bebas</text>

  <!-- print_confirmed -->
  <rect x="450" y="1270" width="20" height="20" fill="#6A1B9A"/>
  <text x="480" y="1285" font-size="12" fill="#1a1a2e" font-weight="bold">print_confirmed</text>
  <text x="480" y="1302" font-size="11" fill="#555">PATCH berhasil → counter print update realtime</text>

  <!-- TTL note -->
  <text x="450" y="1350" text-anchor="middle" font-size="11" fill="#888">* Lock otomatis expired setelah TTL 3 menit jika tidak di-release manual</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
</svg>
