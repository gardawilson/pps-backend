<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 80mm;
        font-family: Arial, sans-serif;
        font-size: 9pt;
        background: white;
      }

      .label {
        width: 80mm;
        padding: 3mm 4mm;
      }

      .label-header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        border-bottom: 1.5px solid #000;
        padding-bottom: 1.5mm;
        margin-bottom: 2mm;
      }

      .label-header .title {
        font-size: 12pt;
        font-weight: bold;
      }

      .label-header .no-label {
        font-size: 12pt;
        font-weight: bold;
      }

      .label-body {
        display: flex;
        gap: 3mm;
        align-items: flex-start;
      }

      .label-info {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 0.8mm;
      }

      .jenis {
        font-size: 9pt;
        font-weight: bold;
        padding-bottom: 1.5mm;
        display: block;
        width: 100%;
        position: relative;
      }

      .watermark {
        position: absolute;
        top: 50%;
        right: 0;
        transform: translateY(-50%);
        font-size: 16pt;
        font-weight: 900;
        color: rgba(0, 0, 0, 0.3);
        letter-spacing: 2px;
        white-space: nowrap;
        z-index: 0;
      }

      .jenis-text {
        position: relative;
        z-index: 1;
      }

      .label-info .row {
        font-size: 9pt;
        color: #222;
      }

      .label-info .tanggal {
        font-size: 20pt;
        font-weight: bold;
        color: #000;
      }

      .label-qr {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .label-qr img {
        width: 26mm;
        height: 26mm;
      }

      .label-qr .qr-caption {
        font-size: 8pt;
        text-align: center;
        font-weight: bold;
        word-break: break-all;
        max-width: 26mm;
      }

      /* Detail tables (3 columns) */
      .detail-tables {
        display: flex;
        gap: 0;
        margin-top: 2mm;
        align-items: stretch;
      }

      .detail-table-wrap {
        flex: 0 0 25%;
        min-width: 0;
        box-sizing: border-box;
      }

      .detail-table-wrap + .detail-table-wrap {
        border-left: 1px solid #000;
        padding-left: 1.5mm;
      }

      .detail-table-wrap:not(:last-child) {
        padding-right: 1.5mm;
      }

      .detail-table {
        width: 100%;
        table-layout: fixed;
        border-collapse: collapse;
        font-size: 7pt;
      }

      .detail-table thead tr {
        border-top: 1px solid #000;
        border-bottom: 1px solid #000;
      }

      .detail-table th {
        font-weight: bold;
        padding: 0.4mm 0.8mm;
        text-align: left;
        white-space: nowrap;
      }

      .detail-table th.right,
      .detail-table td.right {
        text-align: right;
      }

      .detail-table td {
        padding: 0.2mm 0.8mm;
        color: #222;
        border-bottom: 0.5px solid #ccc;
      }

      .detail-table tbody tr:last-child td {
        border-bottom: 1px solid #000;
      }
    </style>
  </head>
  <body>
    <div class="label">
      <!-- Header -->
      <div class="label-header">
        <span class="title">BAHAN BAKU</span>
        <span class="no-label">({{noLabel}})</span>
      </div>

      <!-- Jenis plastik -->
      <div class="jenis">
        <span class="jenis-text">{{namaJenisPlastik}}</span>
        <span class="watermark">{{watermarkText}}</span>
      </div>

      <!-- Body -->
      <div class="label-body">
        <!-- Kiri: info -->
        <div class="label-info">
          <div class="row">Supplier : {{namaSupplier}}</div>
          <div class="row">No Plat &nbsp;: {{noPlat}}</div>
          <div class="row">By &nbsp;: {{createBy}}</div>
          <div class="tanggal">{{tanggal}}</div>
        </div>

        <!-- Kanan: QR code -->
        <div class="label-qr">
          <img src="{{qrBase64}}" alt="QR" />
          <div class="qr-caption">{{noLabel}}</div>
        </div>
      </div>

      <!-- Detail sak tables (3 columns) -->
      <div class="detail-tables">{{detailTables}}</div>

      <!-- Summary -->
      <div style="font-size: 8pt; font-weight: bold; margin-top: 1mm">
        Jumlah: {{sakSisa}} Sak &nbsp;|&nbsp; Berat: {{beratSisa}}
      </div>
    </div>
  </body>
</html>
