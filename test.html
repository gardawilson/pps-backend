<!doctype html>
<html>
  <body>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
      const socket = io("http://192.168.11.153:7500");

      socket.on("connect", () => {
        console.log("Connected:", socket.id);
      });

      socket.on("initial_locks", (locks) => {
        console.log("Initial locks:", locks);
      });

      socket.on("lock_acquired", (data) => {
        console.log("LOCK ACQUIRED:", data);
      });

      socket.on("lock_released", (data) => {
        console.log("LOCK RELEASED:", data);
      });
    </script>
  </body>
</html>
